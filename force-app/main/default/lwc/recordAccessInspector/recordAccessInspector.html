<template>
  <section class={shellClassName}>
    <template if:true={isLoading}>
      <div class="state-card">
        <lightning-spinner alternative-text="Loading record access" size="medium"></lightning-spinner>
        <p class="state-text">Analyzing effective record access paths...</p>
      </div>
    </template>

    <template if:true={errorMessage}>
      <div class="state-card state-card--error">
        <h2 class="state-title">Unable to load record access</h2>
        <p class="state-text">{errorMessage}</p>
      </div>
    </template>

    <template if:false={hasRecordContext}>
      <div class="state-card">
        <h2 class="state-title">Open this on a record page</h2>
        <p class="state-text">This component inspects access for a specific record.</p>
      </div>
    </template>

    <template if:true={showMainContent}>
      <section class="compact-panel">
        <div class="compact-topline">
          <div class="compact-headline">
            <span class="compact-title">{response.objectLabel}</span>
            <span class="compact-subtitle">{selectedCountLabel}</span>
          </div>

          <div class="mode-toggle mode-toggle--compact" role="group" aria-label="Access mode selector">
            <template for:each={modeButtons} for:item="mode">
              <button
                key={mode.value}
                class={mode.className}
                data-mode={mode.value}
                onclick={handleModeChange}
                title={mode.title}
                type="button"
              >
                {mode.label}
              </button>
            </template>
          </div>
        </div>

        <div class="compact-summary">
          <template for:each={compactStats} for:item="stat">
            <span key={stat.key} class="compact-stat" title={stat.title}>
              {stat.label} <strong>{stat.value}</strong>
            </span>
          </template>
        </div>

        <template if:true={hasUsers}>
          <div class="compact-toolbar">
            <div class="scope-toggle scope-toggle--compact" role="group" aria-label="User scope selector">
              <template for:each={userScopeButtons} for:item="scope">
                <button
                  key={scope.value}
                  class={scope.className}
                  data-scope={scope.value}
                  onclick={handleUserScopeChange}
                  title={scope.title}
                  type="button"
                >
                  {scope.label}
                </button>
              </template>
            </div>
            <input
              class="compact-search"
              type="search"
              placeholder="Search user, profile, role, path"
              value={searchTerm}
              onkeyup={handleSearchInput}
              onchange={handleSearchInput}
            />

            <select class="compact-select" value={pageSizeValue} onchange={handlePageSizeChange}>
              <template for:each={compactToolbarPageSizeOptions} for:item="sizeOption">
                <option key={sizeOption.value} value={sizeOption.value}>{sizeOption.label}</option>
              </template>
            </select>

            <div class="compact-pager">
              <span class="compact-page-summary">{compactToolbarPageSummary}</span>
              <button class="pager__button" type="button" onclick={handlePreviousPage} disabled={disablePreviousButton}>
                Prev
              </button>
              <button class="pager__button" type="button" onclick={handleNextPage} disabled={disableNextButton}>
                Next
              </button>
            </div>
          </div>
        </template>
      </section>

      <template if:true={hasNotes}>
        <section class="notes">
          <template for:each={notes} for:item="note">
            <p key={note} class="note-item">{note}</p>
          </template>
        </section>
      </template>

      <template if:true={showUsersGrid}>
        <section class="compact-table-shell">
          <div class="compact-table-scroll">
            <table class="compact-table">
              <thead>
                <tr>
                  <th scope="col">User</th>
                  <th scope="col">Access Context</th>
                  <th scope="col">Perm</th>
                  <th scope="col">Access Paths</th>
                </tr>
              </thead>
              <tbody>
                <template for:each={pagedUsers} for:item="userRow">
                  <tr key={userRow.userId}>
                    <td class="compact-table__cell compact-table__cell--user">
                      <p class="compact-user-name">{userRow.userName}</p>
                      <p class="compact-user-line">{userRow.loginName}</p>
                    </td>
                    <td class="compact-table__cell compact-table__cell--context">
                      <template if:true={isSmallCompactLayout}>
                        <div class="compact-section-heading">
                          <span class="compact-section-title">Access Context</span>
                          <lightning-button-icon
                            class="compact-section-toggle"
                            icon-name={userRow.contextToggleIcon}
                            alternative-text={userRow.contextToggleTitle}
                            title={userRow.contextToggleTitle}
                            data-user-id={userRow.userId}
                            onclick={handleContextDetailToggle}
                            size="x-small"
                            variant="bare"
                          ></lightning-button-icon>
                        </div>

                        <template if:true={userRow.isContextExpanded}>
                          <div class="compact-section-body">
                            <p class="compact-user-line">
                              <template if:true={userRow.profileUrl}>
                                <a href={userRow.profileUrl} class="setup-link" target="_blank">{userRow.profileName}</a>
                              </template>
                              <template if:false={userRow.profileUrl}>
                                <span>{userRow.profileName}</span>
                              </template>
                              <span class="compact-divider">|</span>
                              <span>{userRow.roleName}</span>
                            </p>
                            <p class="compact-user-line">{userRow.userType} | Max {userRow.maxAccessLevel}</p>
                          </div>
                        </template>
                      </template>

                      <template if:false={isSmallCompactLayout}>
                        <p class="compact-user-line">
                          <template if:true={userRow.profileUrl}>
                            <a href={userRow.profileUrl} class="setup-link" target="_blank">{userRow.profileName}</a>
                          </template>
                          <template if:false={userRow.profileUrl}>
                            <span>{userRow.profileName}</span>
                          </template>
                          <span class="compact-divider">|</span>
                          <span>{userRow.roleName}</span>
                        </p>
                        <p class="compact-user-line">{userRow.userType} | Max {userRow.maxAccessLevel}</p>
                      </template>
                    </td>
                    <td class="compact-table__cell compact-table__cell--perm">
                      <div class="perm-strip perm-strip--compact">
                        <template for:each={userRow.permissionBadges} for:item="badge">
                          <span key={badge.key} class={badge.className} title={badge.title}>{badge.label}</span>
                        </template>
                      </div>
                    </td>
                    <td class="compact-table__cell compact-table__cell--paths">
                      <template if:true={isSmallCompactLayout}>
                        <div class="compact-section-heading">
                          <span class="compact-section-title">Access Paths</span>
                          <lightning-button-icon
                            class="compact-section-toggle"
                            icon-name={userRow.pathToggleIcon}
                            alternative-text={userRow.pathToggleTitle}
                            title={userRow.pathToggleTitle}
                            data-user-id={userRow.userId}
                            onclick={handlePathDetailToggle}
                            size="x-small"
                            variant="bare"
                          ></lightning-button-icon>
                        </div>

                        <div class="path-summary">
                          <div class="path-summary__badges">
                            <template for:each={userRow.pathSummaryBadges} for:item="group">
                              <button
                                key={group.key}
                                class={group.className}
                                title={group.title}
                                data-user-id={userRow.userId}
                                data-group-key={group.groupKey}
                                onclick={handlePathSummaryClick}
                                type="button"
                              >
                                <span class="path-summary-badge__label">{group.shortLabel}</span>
                                <span class="path-summary-badge__count">{group.count}</span>
                              </button>
                            </template>
                          </div>
                        </div>
                      </template>

                      <template if:false={isSmallCompactLayout}>
                        <div class="path-summary">
                          <div class="path-summary__badges">
                            <template for:each={userRow.pathSummaryBadges} for:item="group">
                              <button
                                key={group.key}
                                class={group.className}
                                title={group.title}
                                data-user-id={userRow.userId}
                                data-group-key={group.groupKey}
                                onclick={handlePathSummaryClick}
                                type="button"
                              >
                                <span class="path-summary-badge__label">{group.shortLabel}</span>
                                <span class="path-summary-badge__count">{group.count}</span>
                              </button>
                            </template>
                          </div>

                          <button
                            class="path-toggle"
                            data-user-id={userRow.userId}
                            onclick={handlePathDetailToggle}
                            title="Show all access path details"
                            type="button"
                          >
                            {userRow.pathToggleLabel}
                          </button>
                        </div>
                      </template>
                    </td>
                  </tr>
                  <template if:true={userRow.isExpanded}>
                    <tr key={userRow.detailRowKey} class="compact-detail-row">
                      <td colspan="4" class="compact-detail-row__cell">
                        <section class="path-detail">
                          <div class="path-detail__header">
                            <p class="path-detail__title">Access path details</p>
                            <div class="path-detail__actions">
                              <template if:true={userRow.hasActivePathGroup}>
                                <button
                                  class="path-detail__action"
                                  data-user-id={userRow.userId}
                                  onclick={handleShowAllPathGroups}
                                  title="Show all access path groups"
                                  type="button"
                                >
                                  All paths
                                </button>
                              </template>
                            </div>
                          </div>

                          <div class="path-detail__groups">
                            <template for:each={userRow.visiblePathGroups} for:item="group">
                              <section key={group.key} class={group.className}>
                                <div class="path-group__header">
                                  <span class="path-group__badge">{group.shortLabel}</span>
                                  <p class="path-group__title">{group.label}</p>
                                  <span class="path-group__count">{group.count}</span>
                                </div>

                                <div class="path-group__list">
                                  <template for:each={group.paths} for:item="path">
                                    <template if:true={path.url}>
                                      <a key={path.key} href={path.url} class="path-detail-link" target="_blank">
                                        {path.label}
                                      </a>
                                    </template>
                                    <template if:false={path.url}>
                                      <span key={path.key} class="path-detail-text">{path.label}</span>
                                    </template>
                                  </template>
                                </div>
                              </section>
                            </template>
                          </div>
                        </section>
                      </td>
                    </tr>
                  </template>
                </template>
              </tbody>
            </table>
          </div>
        </section>
      </template>

      <template if:true={showFilterEmptyState}>
        <div class="state-card">
          <h2 class="state-title">No users match your search</h2>
          <p class="state-text">Adjust the search text or page size to see matching users.</p>
        </div>
      </template>

      <template if:true={showEmptyState}>
        <div class="state-card">
          <h2 class="state-title">No users matched this access level</h2>
          <p class="state-text">Try a different toggle or verify sharing for this record.</p>
        </div>
      </template>
    </template>
  </section>
</template>
